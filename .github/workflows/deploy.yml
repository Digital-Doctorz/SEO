name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Verify SEO static assets
        run: |
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          test -f dist/favicon.svg
          test -f dist/index.html
          grep -q "Kolkata" dist/index.html
          echo "Build artifacts OK — production deploy via Vercel Git integration"
